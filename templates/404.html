{% load static %}
<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página no encontrada · VacWeb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --gp-green: #0b6b2b;
      --gp-ink:   #0f172a;
    }
    html, body { height: 100%; margin: 0; }
    body {
      background: #f5f7fb;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .error-card {
      max-width: 520px; width: 100%;
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(15,23,42,.10);
      padding: 3rem 2.5rem;
      text-align: center;
    }
    .error-code {
      font-size: 6rem; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-icon {
      width: 72px; height: 72px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2rem; margin-bottom: 1rem;
      background: #eff6ff; color: #2563eb;
    }
    .brand { font-weight: 700; color: var(--gp-green); font-size: .95rem; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
    .url-box {
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: .5rem 1rem;
      font-family: monospace; font-size: .82rem;
      color: #64748b; word-break: break-all;
    }
  </style>
</head>
<body>
<div class="error-card">
  <div class="mb-3">
    <span class="brand"><i class="bi bi-geo-alt me-1"></i>VacWeb</span>
  </div>

  <div class="error-icon"><i class="bi bi-map"></i></div>
  <div class="error-code">404</div>
  <h1 class="h4 fw-bold mt-2 mb-1" style="color:var(--gp-ink)">Página no encontrada</h1>
  <p class="text-muted mb-3">
    La página que buscas no existe o fue movida.<br>
    Verifica la URL o regresa al inicio.
  </p>

  {% if request_path %}
  <div class="url-box mb-3">
    <i class="bi bi-link-45deg me-1"></i>{{ request_path }}
  </div>
  {% endif %}

  <hr class="divider">

  <div class="d-flex gap-2 justify-content-center flex-wrap">
    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm px-4">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
    <a href="/" class="btn btn-dark btn-sm px-4">
      <i class="bi bi-house me-1"></i>Inicio
    </a>
  </div>

  <p class="text-muted mt-3 mb-0" style="font-size:.75rem">
    HTTP 404 Not Found
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
